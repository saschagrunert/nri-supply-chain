apiVersion: v1
kind: Namespace
metadata:
  name: nri-supply-chain
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nri-supply-chain-config
  namespace: nri-supply-chain
data:
  config.toml: |
    verification = "warn"
    fetch_timeout = "30s"
    fetch_failure_policy = "warn"
    cache_ttl = "24h"
    policy_dir = "/etc/nri-supply-chain/policies"
    metrics_addr = "127.0.0.1:9090"
    circuit_breaker_threshold = 5
    circuit_breaker_cooldown = "30s"
  default.json: |
    {
      "trust": {
        "builders": [
          {
            "id": "https://github.com/actions/runner",
            "maxLevel": 3
          }
        ],
        "issuers": [
          "https://accounts.google.com",
          "https://token.actions.githubusercontent.com"
        ],
        "sources": ["github.com/myorg/*"]
      },
      "exclude": ["gcr.io/distroless/*"],
      "provenance": {
        "missingPolicy": "warn"
      },
      "vex": {
        "missingPolicy": "allow"
      },
      "signatures": {
        "requireTransparencyLog": false
      }
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nri-supply-chain
  namespace: nri-supply-chain
  labels:
    app.kubernetes.io/name: nri-supply-chain
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nri-supply-chain
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nri-supply-chain
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: nri-supply-chain
          # Pin a specific image version for production. Prefer digest
          # references for immutability, for example:
          # image: ghcr.io/saschagrunert/nri-supply-chain@sha256:<digest>
          # Or use a version tag:
          # image: ghcr.io/saschagrunert/nri-supply-chain:v0.1.0
          image: ghcr.io/saschagrunert/nri-supply-chain:latest
          args:
            - --config
            - /etc/nri-supply-chain/config.toml
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nri-socket
              mountPath: /var/run/nri
            - name: config
              mountPath: /etc/nri-supply-chain/config.toml
              subPath: config.toml
              readOnly: true
            - name: config
              mountPath: /etc/nri-supply-chain/policies/default.json
              subPath: default.json
              readOnly: true
      volumes:
        - name: nri-socket
          hostPath:
            path: /var/run/nri
            type: DirectoryOrCreate
        - name: config
          configMap:
            name: nri-supply-chain-config
