apiVersion: v1
kind: Namespace
metadata:
  name: nri-supply-chain
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nri-supply-chain-config
  namespace: nri-supply-chain
data:
  config.toml: |
    verification = "warn"
    fetch_timeout = "30s"
    fetch_failure_policy = "warn"
    cache_ttl = "24h"
    cache_failure_ttl = "5m"
    policy_dir = "/etc/nri-supply-chain/policies"
    metrics_addr = ":9090"
    circuit_breaker_threshold = 5
    circuit_breaker_cooldown = "30s"
  default.json: |
    {
      "trust": {
        "builders": [
          {
            "id": "https://github.com/actions/runner",
            "maxLevel": 3
          }
        ],
        "issuers": [
          "https://accounts.google.com",
          "https://token.actions.githubusercontent.com"
        ],
        "sanPatterns": ["*@myorg.com", "https://github.com/myorg/*"],
        "sources": ["github.com/myorg/*"]
      },
      "exclude": ["gcr.io/distroless/*"],
      "slsa": {
        "missingPolicy": "warn"
      },
      "vex": {
        "missingPolicy": "allow"
      },
      "signatures": {
        "requireTransparencyLog": false
      }
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nri-supply-chain
  namespace: nri-supply-chain
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nri-supply-chain
  namespace: nri-supply-chain
  labels:
    app.kubernetes.io/name: nri-supply-chain
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nri-supply-chain
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nri-supply-chain
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: nri-supply-chain
      automountServiceAccountToken: false
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      containers:
        - name: nri-supply-chain
          image: ghcr.io/saschagrunert/nri-supply-chain:0.1.5
          args:
            - --config
            - /etc/nri-supply-chain/config.toml
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: metrics
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nri-socket
              mountPath: /var/run/nri
            - name: config
              mountPath: /etc/nri-supply-chain/config.toml
              subPath: config.toml
              readOnly: true
            - name: config
              mountPath: /etc/nri-supply-chain/policies/default.json
              subPath: default.json
              readOnly: true
      volumes:
        - name: nri-socket
          hostPath:
            path: /var/run/nri
            type: DirectoryOrCreate
        - name: config
          configMap:
            name: nri-supply-chain-config
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nri-supply-chain
  namespace: nri-supply-chain
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nri-supply-chain
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 9090
          protocol: TCP
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP
