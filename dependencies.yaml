dependencies:
  - name: golangci-lint
    version: 2.12.2
    refPaths:
      - path: Makefile
        match: ^GOLANGCI_LINT_VERSION
      - path: .github/workflows/ci.yml
        match: "version: v"

  - name: syft
    version: 1.45.1
    refPaths:
      - path: .github/workflows/ci.yml
        match: "syft/"
      - path: .github/workflows/release.yml
        match: "syft/"

  - name: zeitgeist
    version: 0.7.0
    refPaths:
      - path: Makefile
        match: ^ZEITGEIST_VERSION

  - name: shfmt
    version: 3.13.1
    refPaths:
      - path: Makefile
        match: ^SHFMT_VERSION

  - name: shellcheck
    version: v0.11.0
    refPaths:
      - path: Makefile
        match: ^SHELLCHECK_VERSION

  - name: kubernix
    version: 0.3.3
    refPaths:
      - path: Makefile
        match: ^KUBERNIX_VERSION

  - name: mdtoc
    version: v1.4.0
    refPaths:
      - path: Makefile
        match: ^MDTOC_VERSION
