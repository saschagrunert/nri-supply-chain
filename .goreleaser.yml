version: 2

project_name: nri-supply-chain

builds:
  - main: ./cmd/nri-supply-chain/
    binary: nri-supply-chain
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - binary

checksum:
  name_template: checksums.txt

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --bundle=${signature}
      - --yes
      - ${artifact}
    artifacts: checksum

sboms:
  - artifacts: binary

changelog:
  sort: asc

dockers_v2:
  - images:
      - "ghcr.io/saschagrunert/nri-supply-chain"
    dockerfile: Dockerfile.goreleaser
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    annotations:
      "org.opencontainers.image.title": "nri-supply-chain"
      "org.opencontainers.image.description": "NRI plugin for container supply chain attestation verification"
      "org.opencontainers.image.source": "https://github.com/saschagrunert/nri-supply-chain"
      "org.opencontainers.image.url": "https://github.com/saschagrunert/nri-supply-chain"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.licenses": "Apache-2.0"

docker_signs:
  - cmd: cosign
    artifacts: all
    args:
      - sign
      - --yes
      - "${artifact}"

nfpms:
  - id: nri-supply-chain
    package_name: nri-supply-chain
    vendor: nri-supply-chain Authors
    homepage: https://github.com/saschagrunert/nri-supply-chain
    maintainer: Sascha Grunert
    description: NRI plugin for container supply chain attestation verification
    license: Apache-2.0
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    contents:
      - src: deploy/systemd/nri-supply-chain.service
        dst: /usr/lib/systemd/system/nri-supply-chain.service
      - src: deploy/examples/config.toml
        dst: /etc/nri-supply-chain/config.toml
        type: config|noreplace
      - src: deploy/examples/policies/default.json
        dst: /etc/nri-supply-chain/policies/default.json
        type: config|noreplace
      - dst: /etc/nri-supply-chain/policies
        type: dir
        file_info:
          mode: 0755
    scripts:
      postinstall: deploy/scripts/postinstall.sh
      preremove: deploy/scripts/preremove.sh

release:
  extra_files:
    - glob: deploy/kubernetes/*.yaml
    - glob: deploy/systemd/*.service
    - glob: deploy/examples/config.toml
    - glob: deploy/examples/policies/default.json
