# NRI Supply Chain Verification Plugin Configuration
#
# Master toggle: "disabled" (default), "warn" (log-only), "enforce" (reject on failure).
verification = "warn"

# Per-fetch timeout for retrieving attestations.
fetch_timeout = "30s"

# Behavior on network errors: "allow", "warn" (default), "deny".
fetch_failure_policy = "warn"

# How long verification results are cached per image digest + namespace.
# Set to "0s" to disable caching.
cache_ttl = "24h"

# Directory containing per-namespace JSON policy files.
# <dir>/default.json is the base policy.
# <dir>/<namespace>.json overrides for that namespace.
policy_dir = "/etc/nri-supply-chain/policies"

# Listen address for the Prometheus metrics HTTP server.
metrics_addr = "127.0.0.1:9090"

# Number of consecutive fetch failures before the circuit breaker opens.
# While open, requests short-circuit to fetch_failure_policy.
circuit_breaker_threshold = 5

# Duration the circuit breaker stays open before allowing a probe request.
circuit_breaker_cooldown = "30s"

# Maximum registry fetch requests per second (0 = unlimited).
# fetch_rate_limit = 50
