name: deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write
  deployments: write

env:
  IMAGE: ghcr.io/saschagrunert/nri-supply-chain

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest

      - name: Build and push latest image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        run: cosign sign --yes "$IMAGE:latest"

      - name: Create deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOY_ID=$(gh api repos/${{ github.repository }}/deployments \
            --input - \
            --jq '.id' <<EOF
          {"ref":"${{ github.sha }}","environment":"latest","auto_merge":false,"required_contexts":[]}
          EOF
          )
          gh api repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses \
            -f state=success \
            -f environment_url="https://ghcr.io/${{ github.repository }}:latest" \
            --silent
