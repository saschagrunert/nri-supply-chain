name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.49.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/nri-supply-chain_*
            dist/checksums.txt
      - name: Install crane
        run: make build/crane
      - name: Attest container image provenance
        env:
          IMAGE: ghcr.io/saschagrunert/nri-supply-chain
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIGEST=$(./build/crane digest "${IMAGE}:${VERSION}")
          cat > /tmp/slsa-provenance.json <<EOF
          {
            "buildDefinition": {
              "buildType": "https://github.com/${{ github.repository }}/.github/workflows/release.yml",
              "externalParameters": {
                "source": "github.com/${{ github.repository }}"
              },
              "resolvedDependencies": [
                {
                  "uri": "git+https://github.com/${{ github.repository }}@${{ github.ref }}",
                  "digest": { "sha1": "${{ github.sha }}" }
                }
              ]
            },
            "runDetails": {
              "builder": {
                "id": "https://github.com/${{ github.repository }}/.github/workflows/release.yml"
              },
              "metadata": {
                "invocationId": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }
            }
          }
          EOF
          cosign attest --predicate /tmp/slsa-provenance.json \
            --type slsaprovenance1 \
            --yes \
            "${IMAGE}@${DIGEST}"
      - name: Compute release version
        id: release
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Scan container image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/saschagrunert/nri-supply-chain:${{ steps.release.outputs.version }}
          exit-code: "1"
      - name: Attest container image VEX
        env:
          IMAGE: ghcr.io/saschagrunert/nri-supply-chain
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIGEST=$(./build/crane digest "${IMAGE}:${VERSION}")
          PRODUCT="pkg:oci/nri-supply-chain@${DIGEST}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > /tmp/vex-predicate.json <<EOF
          {
            "@context": "https://openvex.dev/ns/v0.2.0",
            "@id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/vex",
            "author": "https://github.com/${{ github.repository }}/.github/workflows/release.yml",
            "timestamp": "${TIMESTAMP}",
            "statements": [
              {
                "vulnerability": {"name": "trivy-scan-clean"},
                "products": [{"@id": "${PRODUCT}"}],
                "status": "not_affected",
                "justification": "vulnerable_code_not_present"
              }
            ]
          }
          EOF
          cosign attest --predicate /tmp/vex-predicate.json \
            --type https://openvex.dev/ns \
            --yes \
            "${IMAGE}@${DIGEST}"
      - name: Verify container image before VSA
        env:
          IMAGE: ghcr.io/saschagrunert/nri-supply-chain
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p /tmp/verify-policies
          cat > /tmp/verify-policies/default.json <<EOF
          {
            "trust": {
              "issuers": ["https://token.actions.githubusercontent.com"],
              "sanPatterns": ["https://github.com/${{ github.repository }}/**"],
              "sources": ["github.com/${{ github.repository_owner }}/*"]
            },
            "slsa": { "missingPolicy": "deny" },
            "vex": { "missingPolicy": "deny" }
          }
          EOF
          cat > /tmp/verify-config.toml <<EOF
          verification = "enforce"
          policy_dir = "/tmp/verify-policies"
          EOF
          ./dist/nri-supply-chain_linux_amd64_v1/nri-supply-chain \
            --config /tmp/verify-config.toml \
            --verify-image "${IMAGE}:${VERSION}"
      - name: Attest container image VSA
        env:
          IMAGE: ghcr.io/saschagrunert/nri-supply-chain
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIGEST=$(./build/crane digest "${IMAGE}:${VERSION}")
          cat > /tmp/vsa-predicate.json <<EOF
          {
            "verifier": {
              "id": "https://github.com/${{ github.repository }}/.github/workflows/release.yml"
            },
            "timeVerified": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "resourceUri": "${IMAGE}@${DIGEST}",
            "policy": {
              "uri": "https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/deploy/examples/policies/default.json"
            },
            "verificationResult": "PASSED",
            "verifiedLevels": ["SLSA_BUILD_LEVEL_3"],
            "slsaVersion": "1.0"
          }
          EOF
          cosign attest --predicate /tmp/vsa-predicate.json \
            --type https://slsa.dev/verification_summary/v1 \
            --yes \
            "${IMAGE}@${DIGEST}"
